<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hieu Hoang Card Image Source</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }

      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: Inter, "Segoe UI", ui-sans-serif, system-ui, sans-serif;
        color: #edf7f9;
        background:
          linear-gradient(rgba(92, 200, 255, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(92, 200, 255, 0.06) 1px, transparent 1px),
          radial-gradient(circle at 14% 0%, rgba(92, 200, 255, 0.18), transparent 30rem),
          radial-gradient(circle at 90% 100%, rgba(246, 177, 75, 0.12), transparent 26rem),
          linear-gradient(150deg, #03090d 0%, #071118 55%, #02070a 100%);
        background-size: 40px 40px, 40px 40px, auto, auto, auto;
      }

      .wrap {
        display: flex;
        align-items: center;
        gap: 64px;
        height: 100%;
        padding: 60px 72px;
      }

      .identity {
        flex: 1;
        min-width: 0;
      }

      .id-head {
        display: flex;
        align-items: center;
        gap: 28px;
        margin-bottom: 30px;
      }

      .avatar {
        width: 148px;
        height: 148px;
        border-radius: 50%;
        border: 4px solid rgba(92, 200, 255, 0.75);
        object-fit: cover;
        object-position: center 30%;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.5);
      }

      h1 {
        font-size: 54px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .title {
        margin-top: 10px;
        color: #5cc8ff;
        font-size: 25px;
        font-weight: 700;
      }

      .subtitle {
        margin-top: 8px;
        color: #9db5bc;
        font-size: 18px;
      }

      .rule {
        height: 1px;
        margin: 26px 0;
        background: linear-gradient(90deg, rgba(92, 200, 255, 0.55), rgba(246, 177, 75, 0.35), transparent);
      }

      .contacts {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px 28px;
        list-style: none;
        padding: 0;
      }

      .contacts li {
        display: flex;
        align-items: center;
        gap: 13px;
        color: #d7e6ea;
        font-size: 20px;
        white-space: nowrap;
      }

      .ic {
        display: inline-grid;
        place-items: center;
        flex: 0 0 auto;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: 1px solid rgba(92, 200, 255, 0.5);
        background: rgba(92, 200, 255, 0.12);
        color: #5cc8ff;
      }

      .ic svg {
        width: 18px;
        height: 18px;
      }

      .qr-panel {
        flex: 0 0 auto;
        padding: 26px 26px 20px;
        border-radius: 22px;
        background: #ffffff;
        color: #0b2532;
        text-align: center;
        box-shadow: 0 26px 60px rgba(0, 0, 0, 0.55);
      }

      .qr-panel img {
        display: block;
        width: 250px;
        height: 250px;
      }

      .qr-panel p {
        margin-top: 12px;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #0b5f7f;
      }
    </style>
  </head>
  <body>

            hieuhoang1910@outlook.com
          </li>
          <li>
            <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span>

          </li>
          <li>
            <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-3.9a3.4 3.4 0 0 0-.9-2.6c3 0 6.1-1.5 6.1-6.6a5.1 5.1 0 0 0-1.4-3.6 4.7 4.7 0 0 0-.1-3.6s-1.1-.3-3.7 1.4a12.8 12.8 0 0 0-6.7 0C5.7.4 4.6.7 4.6.7a4.7 4.7 0 0 0-.1 3.6A5.1 5.1 0 0 0 3.1 8c0 5.1 3.1 6.6 6.1 6.6a3.4 3.4 0 0 0-1 2.6V22"/></svg></span>
            github.com/hieuhoang1910

      </div>

    </div>
  </body>
